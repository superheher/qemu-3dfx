name: Build QEMU with 3Dfx/Mesa pass-through

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-qemu:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            git
            rsync
            wget
            tar
            patch
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-glib2
            mingw-w64-x86_64-pixman
            mingw-w64-x86_64-SDL2
            mingw-w64-x86_64-meson
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-python
            mingw-w64-x86_64-python-pip
            mingw-w64-x86_64-python-setuptools
            mingw-w64-x86_64-python-sphinx
            mingw-w64-i686-toolchain
            bison
            flex
            gettext-devel

      - name: Checkout
        uses: actions/checkout@v4

      - name: Download and patch QEMU 9.2.2
        run: |
          wget -q https://download.qemu.org/qemu-9.2.2.tar.xz
          tar xf qemu-9.2.2.tar.xz || true
          rm qemu-9.2.2.tar.xz
          cd qemu-9.2.2
          rsync -r ../qemu-0/hw/3dfx ../qemu-1/hw/mesa ./hw/
          patch -p0 -i ../00-qemu92x-mesa-glide.patch
          bash ../scripts/sign_commit

      - name: Pre-install QEMU Python dependencies
        run: |
          python3 -m pip install pycotap sphinx sphinxcontrib-serializinghtml

      - name: Build QEMU
        run: |
          mkdir build && cd build
          ../qemu-9.2.2/configure --target-list=i386-softmmu --disable-guest-agent-msi --disable-guest-agent
          make -j$(($(nproc))) qemu-system-i386 qemu-system-i386w qemu-img qemu-io || make -j$(($(nproc))) qemu-system-i386 qemu-system-i386w

      - name: Build guest wrappers (3dfx)
        run: |
          cd wrappers/3dfx
          mkdir build && cd build
          bash ../../../scripts/conf_wrapper
          make && make clean

      - name: Build guest wrappers (mesa)
        run: |
          cd wrappers/mesa
          mkdir build && cd build
          bash ../../../scripts/conf_wrapper
          make && make clean

      - name: Collect artifacts
        run: |
          mkdir -p release/qemu
          mkdir -p release/wrappers
          cp build/qemu-system-i386.exe release/qemu/ 2>/dev/null || true
          cp build/qemu-system-i386w.exe release/qemu/ 2>/dev/null || true
          # Copy required DLLs from MSYS2
          ldd build/qemu-system-i386.exe 2>/dev/null | grep mingw | awk '{print $3}' | while read dll; do cp "$dll" release/qemu/; done || true
          find wrappers/3dfx/build -type f \( -name "*.dll" -o -name "*.DLL" -o -name "*.vxd" -o -name "*.VXD" -o -name "*.sys" -o -name "*.SYS" -o -name "*.exe" -o -name "*.EXE" -o -name "*.ovl" -o -name "*.OVL" \) -exec cp {} release/wrappers/ \; 2>/dev/null || true
          find wrappers/mesa/build -type f \( -name "*.dll" -o -name "*.DLL" -o -name "*.exe" -o -name "*.EXE" \) -exec cp {} release/wrappers/ \; 2>/dev/null || true
          ls -laR release/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qemu-3dfx-windows-x86_64
          path: release/
          retention-days: 90

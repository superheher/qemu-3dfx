name: Build QEMU with 3Dfx/Mesa pass-through

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-qemu:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            git
            rsync
            wget
            tar
            patch
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-glib2
            mingw-w64-x86_64-pixman
            mingw-w64-x86_64-SDL2
            mingw-w64-x86_64-meson
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-python
            mingw-w64-x86_64-python-pip
            mingw-w64-x86_64-python-setuptools
            mingw-w64-x86_64-python-sphinx
            mingw-w64-i686-toolchain
            bison
            flex
            gettext-devel
            vim

      - name: Checkout
        uses: actions/checkout@v4

      - name: Download and patch QEMU 9.2.2
        run: |
          wget -q https://download.qemu.org/qemu-9.2.2.tar.xz
          tar xf qemu-9.2.2.tar.xz || true
          rm qemu-9.2.2.tar.xz
          cd qemu-9.2.2
          rsync -r ../qemu-0/hw/3dfx ../qemu-1/hw/mesa ./hw/
          patch -p0 -i ../00-qemu92x-mesa-glide.patch
          bash ../scripts/sign_commit

      - name: Pre-install QEMU Python dependencies
        run: |
          python3 -m pip install pycotap sphinx sphinxcontrib-serializinghtml

      - name: Build QEMU
        run: |
          mkdir build && cd build
          ../qemu-9.2.2/configure --target-list=i386-softmmu --disable-guest-agent-msi --disable-guest-agent
          make -j$(($(nproc))) || true
          test -f qemu-system-i386.exe || test -f qemu-system-i386w.exe

      - name: Build guest wrappers (3dfx)
        env:
          MSYSTEM: MINGW32
        run: |
          cd wrappers/3dfx
          mkdir build && cd build
          bash ../../../scripts/conf_wrapper
          make || true

      - name: Build guest wrappers (mesa)
        env:
          MSYSTEM: MINGW32
        run: |
          cd wrappers/mesa
          mkdir build && cd build
          bash ../../../scripts/conf_wrapper
          make || true

      - name: Collect artifacts
        run: |
          mkdir -p release/qemu
          mkdir -p release/wrappers
          # QEMU executables
          cp build/qemu-system-i386.exe release/qemu/ 2>/dev/null || true
          cp build/qemu-system-i386w.exe release/qemu/ 2>/dev/null || true
          cp build/qemu-img.exe release/qemu/ 2>/dev/null || true
          # Copy required DLLs from MSYS2
          ldd build/qemu-system-i386.exe 2>/dev/null | grep mingw | awk '{print $3}' | while read dll; do cp "$dll" release/qemu/; done || true
          # Copy pc-bios firmware files into share/qemu/ next to exe
          for f in bios.bin bios-256k.bin kvmvapic.bin linuxboot.bin linuxboot_dma.bin multiboot.bin multiboot_dma.bin \
                   vgabios.bin vgabios-cirrus.bin vgabios-stdvga.bin vgabios-vmware.bin vgabios-qxl.bin vgabios-virtio.bin vgabios-bochs-display.bin vgabios-ramfb.bin vgabios-ati.bin \
                   efi-e1000.rom efi-e1000e.rom efi-virtio.rom efi-pcnet.rom efi-rtl8139.rom efi-ne2k_pci.rom efi-vmxnet3.rom \
                   pvh.bin; do
            cp "qemu-9.2.2/pc-bios/$f" release/qemu/ 2>/dev/null || true
          done
          cp build/pc-bios/optionrom/*.bin release/qemu/ 2>/dev/null || true
          # Guest wrappers
          find wrappers/3dfx/build -type f \( -name "*.dll" -o -name "*.DLL" -o -name "*.vxd" -o -name "*.VXD" -o -name "*.sys" -o -name "*.SYS" -o -name "*.exe" -o -name "*.EXE" -o -name "*.ovl" -o -name "*.OVL" \) -exec cp {} release/wrappers/ \; 2>/dev/null || true
          find wrappers/mesa/build -type f \( -name "*.dll" -o -name "*.DLL" -o -name "*.exe" -o -name "*.EXE" \) -exec cp {} release/wrappers/ \; 2>/dev/null || true
          ls -laR release/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qemu-3dfx-windows-x86_64
          path: release/
          retention-days: 90

      - name: Create zip for release
        shell: pwsh
        run: |
          Compress-Archive -Path release/* -DestinationPath qemu-3dfx-windows-x86_64.zip

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "QEMU 9.2.2 with 3Dfx/Mesa pass-through (Windows x86_64)"
          body: |
            QEMU 9.2.2 patched with 3Dfx Glide and MESA GL pass-through.

            **Contents:**
            - `qemu/` — qemu-system-i386.exe, qemu-system-i386w.exe (windowed), qemu-img.exe + required DLLs + firmware
            - `qemu/share/qemu/` — BIOS and firmware files (SeaBIOS, VGA BIOS, EFI ROMs)
            - `wrappers/` — Guest OS wrappers (glide.dll, glide2x.dll, glide3x.dll, opengl32.dll, drivers)

            Built from [kjliew/qemu-3dfx](https://github.com/kjliew/qemu-3dfx) upstream.
          files: qemu-3dfx-windows-x86_64.zip
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
